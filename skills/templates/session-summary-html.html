<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{title}} - Session Summary</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #ff6b9d;
            --secondary: #c44569;
            --accent: #ffd93d;
            --accent2: #6bcb77;
            --accent3: #4d96ff;
            --bg-dark: #1a1a2e;
            --bg-card: #16213e;
            --bg-code: #0f0f23;
            --text-main: #f8f8f2;
            --text-muted: #a0a0c0;
            --border: #2d2d5a;
            --gradient: linear-gradient(135deg, #ff6b9d 0%, #c44569 50%, #ffd93d 100%);
            --gradient2: linear-gradient(45deg, #6bcb77, #4d96ff);
            --shadow: 0 10px 40px rgba(255, 107, 157, 0.15);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        html { scroll-behavior: smooth; }

        body {
            font-family: 'Noto Sans SC', 'ZCOOL KuaiLe', sans-serif;
            background: var(--bg-dark);
            color: var(--text-main);
            line-height: 1.8;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* 浮动装饰 */
        .floating-shapes {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            pointer-events: none;
            z-index: -1;
            overflow: hidden;
        }

        .shape {
            position: absolute;
            border-radius: 50%;
            opacity: 0.15;
            animation: float 20s ease-in-out infinite;
        }

        .shape-1 { width: 300px; height: 300px; background: var(--primary); top: -100px; left: -100px; animation-delay: 0s; }
        .shape-2 { width: 200px; height: 200px; background: var(--accent); top: 50%; right: -50px; animation-delay: -5s; }
        .shape-3 { width: 150px; height: 150px; background: var(--accent2); bottom: 10%; left: 10%; animation-delay: -10s; }
        .shape-4 { width: 100px; height: 100px; background: var(--accent3); top: 30%; left: 20%; animation-delay: -15s; }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            25% { transform: translateY(-20px) rotate(5deg); }
            50% { transform: translateY(0) rotate(0deg); }
            75% { transform: translateY(20px) rotate(-5deg); }
        }

        /* 导航栏 */
        .navbar {
            position: fixed;
            top: 0; left: 0; right: 0;
            height: 70px;
            background: rgba(26, 26, 46, 0.9);
            backdrop-filter: blur(20px);
            border-bottom: 2px solid transparent;
            background-image: linear-gradient(var(--bg-dark), var(--bg-dark)), var(--gradient);
            background-origin: border-box;
            background-clip: padding-box, border-box;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 2rem;
            z-index: 1000;
        }

        .nav-brand {
            font-size: 1.4rem;
            font-weight: 700;
            background: var(--gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: wiggle 3s ease-in-out infinite;
        }

        @keyframes wiggle {
            0%, 100% { transform: rotate(0deg); }
            25% { transform: rotate(-3deg); }
            75% { transform: rotate(3deg); }
        }

        .nav-search {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            background: var(--bg-card);
            border: 2px solid var(--border);
            border-radius: 50px;
            padding: 0.5rem 1.2rem;
            transition: all 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        .nav-search:focus-within {
            border-color: var(--primary);
            box-shadow: 0 0 30px rgba(255, 107, 157, 0.3);
            transform: scale(1.05);
        }

        .nav-search input {
            background: transparent;
            border: none;
            outline: none;
            color: var(--text-main);
            width: 220px;
            font-size: 0.95rem;
        }

        .nav-search svg { 
            width: 20px; 
            height: 20px; 
            color: var(--primary);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        /* 侧边栏 */
        .sidebar {
            position: fixed;
            top: 70px;
            left: 0;
            width: 280px;
            height: calc(100vh - 70px);
            background: rgba(22, 33, 62, 0.8);
            backdrop-filter: blur(10px);
            border-right: 2px solid var(--border);
            padding: 1.5rem;
            overflow-y: auto;
            transition: all 0.3s ease;
        }

        .sidebar:hover {
            background: rgba(22, 33, 62, 0.95);
        }

        .sidebar-title {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            color: var(--primary);
            margin-bottom: 1.2rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .sidebar-title::before {
            content: '✨';
            animation: bounce 1s infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }

        .toc-list { list-style: none; }

        .toc-item { margin-bottom: 0.6rem; }

        .toc-link {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.6rem 1rem;
            color: var(--text-muted);
            text-decoration: none;
            border-radius: 15px;
            font-size: 0.9rem;
            transition: all 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            position: relative;
            overflow: hidden;
        }

        .toc-link::before {
            content: '🧸';
            font-size: 0.8rem;
            transition: transform 0.3s;
        }

        .toc-link:hover, .toc-link.active {
            background: linear-gradient(135deg, rgba(255, 107, 157, 0.2), rgba(255, 217, 61, 0.1));
            color: var(--primary);
            transform: translateX(10px);
            box-shadow: 0 5px 20px rgba(255, 107, 157, 0.2);
        }

        .toc-link:hover::before {
            transform: scale(1.2) rotate(10deg);
        }

        .toc-link.level-3 { padding-left: 1.8rem; font-size: 0.85rem; }

        /* 主内容 */
        .main-content {
            margin-left: 280px;
            margin-top: 70px;
            padding: 2rem 3rem;
            max-width: 1100px;
        }

        /* 标题 */
        h1 {
            font-size: 3rem;
            font-weight: 800;
            margin-bottom: 1.5rem;
            background: var(--gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-align: center;
            animation: titleGlow 3s ease-in-out infinite;
        }

        @keyframes titleGlow {
            0%, 100% { filter: brightness(1); }
            50% { filter: brightness(1.2); }
        }

        h2 {
            font-size: 1.8rem;
            font-weight: 700;
            margin: 3rem 0 1.2rem;
            padding: 0.8rem 1.2rem;
            background: var(--gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            display: flex;
            align-items: center;
            gap: 0.6rem;
        }

        h2::before {
            content: '🎯';
            -webkit-text-fill-color: initial;
            animation: bounce 1s infinite;
        }

        h3 {
            font-size: 1.3rem;
            font-weight: 600;
            margin: 1.8rem 0 0.8rem;
            color: var(--accent);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        h3::before {
            content: '💡';
        }

        h4 {
            font-size: 1.1rem;
            font-weight: 600;
            margin: 1.2rem 0 0.6rem;
            color: var(--accent2);
        }

        p { margin-bottom: 1.2rem; color: var(--text-main); }

        /* 代码块 - Q萌风格 */
        .code-block {
            position: relative;
            margin: 1.5rem 0;
            border-radius: 20px;
            overflow: hidden;
            background: var(--bg-code);
            border: 3px solid var(--border);
            transition: all 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        .code-block:hover {
            border-color: var(--primary);
            transform: translateY(-5px) scale(1.01);
            box-shadow: 0 15px 50px rgba(255, 107, 157, 0.25);
        }

        .code-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.8rem 1.2rem;
            background: linear-gradient(90deg, var(--primary), var(--accent));
            border-bottom: 2px solid rgba(255,255,255,0.1);
        }

        .code-lang {
            font-size: 0.8rem;
            color: white;
            font-weight: 700;
            text-transform: uppercase;
            text-shadow: 0 2px 4px rgba(0,0,0,0.2);
        }

        .code-copy {
            display: flex;
            align-items: center;
            gap: 0.4rem;
            padding: 0.5rem 1rem;
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid white;
            border-radius: 20px;
            color: white;
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .code-copy:hover {
            background: white;
            color: var(--primary);
            transform: scale(1.1);
        }

        .code-copy.copied {
            background: var(--accent2);
            border-color: var(--accent2);
            color: white;
        }

        .code-content { padding: 1.2rem; overflow-x: auto; }

        .code-content pre {
            margin: 0;
            font-family: 'Fira Code', 'Consolas', monospace;
            font-size: 0.9rem;
            line-height: 1.7;
            color: #f8f8f2;
        }

        /* 代码高亮 - 糖果色 */
        .code-content .keyword { color: #ff79c6; }
        .code-content .string { color: #f1fa8c; }
        .code-content .number { color: #bd93f9; }
        .code-content .comment { color: #6272a4; font-style: italic; }
        .code-content .function { color: #50fa7b; }
        .code-content .variable { color: #8be9fd; }

        code:not([class*="language-"]) {
            background: linear-gradient(135deg, rgba(255, 107, 157, 0.2), rgba(255, 217, 61, 0.2));
            color: var(--accent);
            padding: 0.25rem 0.5rem;
            border-radius: 8px;
            font-size: 0.9em;
            font-family: 'Fira Code', monospace;
            border: 1px solid var(--primary);
        }

        /* 表格 - 糖果风 */
        table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
            margin: 1.5rem 0;
            border-radius: 20px;
            overflow: hidden;
            border: 3px solid var(--border);
        }

        th, td {
            padding: 1rem 1.2rem;
            text-align: left;
            border-bottom: 2px solid var(--border);
        }

        th {
            background: linear-gradient(135deg, var(--primary), var(--accent));
            color: white;
            font-weight: 700;
            font-size: 1rem;
        }

        tr {
            transition: all 0.3s;
        }

        tr:hover td {
            background: linear-gradient(135deg, rgba(255, 107, 157, 0.1), rgba(107, 203, 119, 0.1));
            transform: scale(1.02);
        }

        tr:last-child td { border-bottom: none; }

        /* 折叠面板 */
        .collapsible {
            margin: 1.2rem 0;
            border: 3px solid var(--border);
            border-radius: 20px;
            overflow: hidden;
            transition: all 0.3s;
        }

        .collapsible:hover {
            border-color: var(--accent);
            box-shadow: 0 10px 30px rgba(255, 217, 61, 0.15);
        }

        .collapsible-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1.2rem;
            background: var(--bg-card);
            cursor: pointer;
            transition: all 0.3s;
        }

        .collapsible-header:hover {
            background: linear-gradient(135deg, rgba(255, 107, 157, 0.1), rgba(77, 150, 255, 0.1));
        }

        .collapsible-header h4 {
            margin: 0;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .collapsible-header h4::before {
            content: '📦';
        }

        .collapsible-icon {
            transition: transform 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            font-size: 1.2rem;
        }

        .collapsible.active .collapsible-icon {
            transform: rotate(180deg) scale(1.2);
        }

        .collapsible-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        .collapsible.active .collapsible-content {
            max-height: 2000px;
        }

        .collapsible-inner {
            padding: 1.5rem;
            background: var(--bg-dark);
            border-top: 2px solid var(--border);
        }

        /* 卡片 - 萌萌哒 */
        .card {
            background: var(--bg-card);
            border: 3px solid var(--border);
            border-radius: 25px;
            padding: 1.8rem;
            margin: 1.5rem 0;
            transition: all 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 5px;
            background: var(--gradient);
        }

        .card:hover {
            transform: translateY(-10px) rotate(1deg);
            box-shadow: 0 20px 60px rgba(255, 107, 157, 0.3);
            border-color: var(--primary);
        }

        .card-title {
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 1rem;
            color: var(--primary);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .card-title::before {
            content: '🎨';
            animation: wiggle 2s infinite;
        }

        /* 标签 - 甜甜的 */
        .tag {
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
            padding: 0.4rem 1rem;
            background: linear-gradient(135deg, rgba(255, 107, 157, 0.2), rgba(255, 217, 61, 0.2));
            border: 2px solid var(--primary);
            border-radius: 25px;
            font-size: 0.8rem;
            color: var(--primary);
            margin-right: 0.6rem;
            margin-bottom: 0.6rem;
            font-weight: 600;
            transition: all 0.3s;
        }

        .tag:hover {
            transform: scale(1.1) rotate(-3deg);
            box-shadow: 0 5px 20px rgba(255, 107, 157, 0.3);
        }

        .tag::before { content: '🏷️'; font-size: 0.8rem; }

        .tag.warning {
            background: linear-gradient(135deg, rgba(255, 107, 107, 0.2), rgba(255, 217, 61, 0.2));
            border-color: var(--accent);
            color: var(--accent);
        }

        .tag.success {
            background: linear-gradient(135deg, rgba(107, 203, 119, 0.2), rgba(77, 150, 255, 0.2));
            border-color: var(--accent2);
            color: var(--accent2);
        }

        /* 引用 */
        blockquote {
            margin: 1.8rem 0;
            padding: 1.5rem 2rem;
            background: linear-gradient(135deg, rgba(255, 107, 157, 0.1), rgba(77, 150, 255, 0.1));
            border-left: 6px solid var(--primary);
            border-radius: 0 20px 20px 0;
            position: relative;
        }

        blockquote::before {
            content: '💭';
            position: absolute;
            top: -15px;
            left: 20px;
            font-size: 2rem;
            animation: bounce 1s infinite;
        }

        blockquote p:last-child { margin-bottom: 0; }

        /* 列表 */
        ul, ol { margin: 1.2rem 0; padding-left: 1.8rem; }

        li {
            margin-bottom: 0.8rem;
            position: relative;
            list-style: none;
        }

        li::before {
            content: '✦';
            color: var(--primary);
            position: absolute;
            left: -1.5rem;
            animation: pulse 1.5s infinite;
        }

        /* 分割线 */
        hr {
            border: none;
            height: 4px;
            background: var(--gradient);
            margin: 3rem 0;
            border-radius: 2px;
            position: relative;
        }

        hr::after {
            content: '✨';
            position: absolute;
            right: 50%;
            top: 50%;
            transform: translate(50%, -50%);
            font-size: 1.5rem;
            animation: bounce 1s infinite;
        }

        /* 动画 */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .animate-in {
            animation: fadeIn 0.6s ease forwards;
        }

        .highlight {
            background: linear-gradient(135deg, rgba(255, 107, 157, 0.4), rgba(255, 217, 61, 0.4));
            padding: 0.15rem 0.4rem;
            border-radius: 6px;
        }

        /* 进度条 */
        .progress-bar {
            position: fixed;
            top: 70px;
            left: 0;
            width: 0%;
            height: 4px;
            background: var(--gradient);
            z-index: 1001;
            transition: width 0.1s;
            border-radius: 0 4px 4px 0;
        }

        /* 文件标签 */
        .file-tabs {
            display: flex;
            gap: 0.8rem;
            margin-bottom: 2rem;
            flex-wrap: wrap;
        }

        .file-tab {
            padding: 0.7rem 1.5rem;
            background: var(--bg-card);
            border: 3px solid var(--border);
            border-radius: 25px;
            color: var(--text-muted);
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            font-size: 0.95rem;
            font-weight: 600;
        }

        .file-tab:hover {
            border-color: var(--accent);
            color: var(--accent);
            transform: translateY(-3px);
        }

        .file-tab.active {
            background: var(--gradient);
            border-color: transparent;
            color: white;
            transform: scale(1.05);
            box-shadow: 0 10px 30px rgba(255, 107, 157, 0.3);
        }

        /* 响应式 */
        @media (max-width: 768px) {
            .sidebar { transform: translateX(-100%); }
            .sidebar.open { transform: translateX(0); }
            .main-content { margin-left: 0; padding: 1.5rem; }
            h1 { font-size: 2rem; }
            h2 { font-size: 1.4rem; }
            .navbar { padding: 0 1rem; }
            .nav-search { display: none; }
        }

        /* 打印 */
        @media print {
            .navbar, .sidebar, .progress-bar, .floating-shapes { display: none; }
            .main-content { margin: 0; padding: 1rem; }
        }
    </style>
</head>
<body>
    <!-- 浮动装饰 -->
    <div class="floating-shapes">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
        <div class="shape shape-3"></div>
        <div class="shape shape-4"></div>
    </div>

    <!-- 进度条 -->
    <div class="progress-bar" id="progressBar"></div>

    <!-- 导航栏 -->
    <nav class="navbar">
        <div class="nav-brand">🧸 Session Summary</div>
        <div class="nav-search">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="11" cy="11" r="8"></circle>
                <path d="m21 21-4.35-4.35"></path>
            </svg>
            <input type="text" id="searchInput" placeholder="搜索内容...">
        </div>
    </nav>

    <!-- 侧边栏 -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-title">目录导航</div>
        <ul class="toc-list" id="tocList"></ul>
    </aside>

    <!-- 主内容 -->
    <main class="main-content" id="mainContent">
        <div class="file-tabs" id="fileTabs"></div>
        <article id="contentArea">
            {{content}}
        </article>
    </main>

    <script>
        // 配置
        const CONFIG = {
            files: [{{files}}],
            defaultFile: '{{defaultFile}}'
        };

        let currentFile = CONFIG.defaultFile || 'session-summary.md';
        
        const contentArea = document.getElementById('contentArea');
        const tocList = document.getElementById('tocList');
        const fileTabs = document.getElementById('fileTabs');
        const searchInput = document.getElementById('searchInput');
        const progressBar = document.getElementById('progressBar');

        // 初始化
        function init() {
            renderFileTabs();
            loadFile(currentFile);
            setupEventListeners();
            generateTOC();
            setupScrollProgress();
            addEnterAnimation();
        }

        // 入场动画
        function addEnterAnimation() {
            const elements = contentArea.querySelectorAll('h1, h2, h3, p, .code-block, .card, table, blockquote');
            elements.forEach((el, i) => {
                el.style.opacity = '0';
                el.style.transform = 'translateY(20px)';
                el.style.transition = 'all 0.5s ease';
                setTimeout(() => {
                    el.style.opacity = '1';
                    el.style.transform = 'translateY(0)';
                }, 100 + i * 80);
            });
        }

        // 渲染文件标签
        function renderFileTabs() {
            if (CONFIG.files.length <= 1) {
                fileTabs.style.display = 'none';
                return;
            }
            
            fileTabs.innerHTML = CONFIG.files.map(file => `
                <button class="file-tab ${file === currentFile ? 'active' : ''}" 
                        data-file="${file}">
                    ${file}
                </button>
            `).join('');
        }

        // 加载文件
        function loadFile(fileName) {
            currentFile = fileName;
            const content = fileContents[fileName] || '文件不存在';
            contentArea.innerHTML = parseMarkdown(content);
            
            document.querySelectorAll('.file-tab').forEach(tab => {
                tab.classList.toggle('active', tab.dataset.file === fileName);
            });
            
            generateTOC();
            attachCopyHandlers();
            addEnterAnimation();
            
            // 代码高亮
            document.querySelectorAll('.code-content pre code').forEach(block => {
                highlightCode(block);
            });
        }

        // 简单语法高亮
        function highlightCode(block) {
            let html = block.innerHTML;
            html = html.replace(/\b(const|let|var|function|return|if|else|for|while|import|from|export|async|await)\b/g, '<span class="keyword">$1</span>');
            html = html.replace(/('.*?'|".*?")/g, '<span class="string">$1</span>');
            html = html.replace(/\b(\d+)\b/g, '<span class="number">$1</span>');
            html = html.replace(/(\/\/.*$)/gm, '<span class="comment">$1</span>');
            block.innerHTML = html;
        }

        // Markdown解析
        function parseMarkdown(text) {
            let html = text;
            html = html.replace(/</g, '&lt;').replace(/>/g, '&gt;');
            
            // 代码块
            html = html.replace(/```(\w+)?\n([\s\S]*?)```/g, (match, lang, code) => {
                return `<div class="code-block">
                    <div class="code-header">
                        <span class="code-lang">${lang || 'code'}</span>
                        <button class="code-copy" onclick="copyCode(this)">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14">
                                <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                                <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
                            </svg>
                            复制
                        </button>
                    </div>
                    <div class="code-content"><pre><code>${escapeHtml(code.trim())}</code></pre></div>
                </div>`;
            });
            
            // 行内代码
            html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
            
            // 标题
            html = html.replace(/^#### (.+)$/gm, '<h4>$1</h4>');
            html = html.replace(/^### (.+)$/gm, '<h3>$1</h3>');
            html = html.replace(/^## (.+)$/gm, '<h2 id="$1">$1</h2>');
            html = html.replace(/^# (.+)$/gm, '<h1>$1</h1>');
            
            // 样式
            html = html.replace(/\*\*\*(.+?)\*\*\*/g, '<strong><em>$1</em></strong>');
            html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
            html = html.replace(/\*(.+?)\*/g, '<em>$1</em>');
            html = html.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank">$1</a>');
            
            // 表格
            const tableRegex = /(\|.+\|\n)+/g;
            html = html.replace(tableRegex, (match) => {
                const lines = match.trim().split('\n');
                if (lines[0]?.includes('---')) return '';
                let table = '<table>';
                lines.forEach((line, i) => {
                    const cells = line.slice(1, -1).split('|').map(c => c.trim());
                    if (cells.every(c => !c)) return '';
                    const tag = i === 0 ? 'th' : 'td';
                    table += '<tr>' + cells.map(c => `<${tag}>${c}</${tag}>`).join('') + '</tr>';
                });
                table += '</table>';
                return table;
            });
            
            // 引用
            html = html.replace(/^> (.+)$/gm, '<blockquote><p>$1</p></blockquote>');
            
            // 列表
            html = html.replace(/^- (.+)$/gm, '<li>$1</li>');
            html = html.replace(/(<li>.*<\/li>\n?)+/g, '<ul>$&</ul>');
            html = html.replace(/^\d+\. (.+)$/gm, '<li>$1</li>');
            
            // 折叠
            html = html.replace(/:::collapsible\s*([^\n]*)\n([\s\S]*?):::/g, (match, title, content) => {
                return `<div class="collapsible">
                    <div class="collapsible-header" onclick="toggleCollapse(this.parentElement)">
                        <h4>${title || '详细信息'}</h4>
                        <span class="collapsible-icon">▼</span>
                    </div>
                    <div class="collapsible-content">
                        <div class="collapsible-inner">${parseMarkdown(content)}</div>
                    </div>
                </div>`;
            });
            
            // 标签
            html = html.replace(/:::tag:::\s*([^\n]+)/g, '<span class="tag">$1</span>');
            html = html.replace(/:::tag\.warning:::\s*([^\n]+)/g, '<span class="tag warning">$1</span>');
            html = html.replace(/:::tag\.success:::\s*([^\n]+)/g, '<span class="tag success">$1</span>');
            
            // 分割线
            html = html.replace(/^---$/gm, '<hr>');
            
            // 段落
            html = html.replace(/^(?!<[hupolt]|<div|<ul|<ol|<table|<blockquote)(.+)$/gm, '<p>$1</p>');
            html = html.replace(/<p>\s*<\/p>/g, '');
            
            return html;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // 目录
        function generateTOC() {
            const headings = contentArea.querySelectorAll('h2, h3');
            let toc = '';
            headings.forEach(h => {
                const id = h.textContent;
                h.id = id;
                const level = h.tagName === 'H2' ? 'level-2' : 'level-3';
                toc += `<li class="toc-item"><a href="#${id}" class="toc-link ${level}">${id}</a></li>`;
            });
            tocList.innerHTML = toc || '<li class="toc-item"><span style="color: var(--text-muted)">暂无目录</span></li>';
            
            tocList.querySelectorAll('.toc-link').forEach(link => {
                link.addEventListener('click', (e) => {
                    e.preventDefault();
                    const targetId = link.getAttribute('href').slice(1);
                    document.getElementById(targetId)?.scrollIntoView({ behavior: 'smooth' });
                });
            });
        }

        // 复制代码
        function copyCode(btn) {
            const code = btn.closest('.code-block').querySelector('code').textContent;
            navigator.clipboard.writeText(code).then(() => {
                btn.classList.add('copied');
                btn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14">
                    <polyline points="20 6 9 17 4 12"></polyline>
                </svg> 已复制`;
                setTimeout(() => {
                    btn.classList.remove('copied');
                    btn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14">
                        <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                        <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
                    </svg> 复制`;
                }, 2000);
            });
        }

        function attachCopyHandlers() {
            document.querySelectorAll('.code-copy').forEach(btn => {
                btn.onclick = () => copyCode(btn);
            });
        }

        function toggleCollapse(el) {
            el.classList.toggle('active');
        }

        // 搜索
        function setupSearch() {
            searchInput.addEventListener('input', (e) => {
                const query = e.target.value.toLowerCase();
                if (!query) {
                    document.querySelectorAll('.highlight').forEach(el => {
                        el.outerHTML = el.textContent;
                    });
                    return;
                }
                
                const walker = document.createTreeWalker(contentArea, NodeFilter.SHOW_TEXT);
                const nodes = [];
                while (walker.nextNode()) nodes.push(walker.currentNode);
                
                nodes.forEach(node => {
                    const text = node.textContent.toLowerCase();
                    if (text.includes(query) && node.parentElement) {
                        const span = document.createElement('span');
                        span.innerHTML = node.textContent.replace(
                            new RegExp(`(${query})`, 'gi'),
                            '<span class="highlight">$1</span>'
                        );
                        node.parentElement.replaceChild(span, node);
                    }
                });
            });
        }

        // 滚动进度
        function setupScrollProgress() {
            window.addEventListener('scroll', () => {
                const winScroll = document.body.scrollTop || document.documentElement.scrollTop;
                const height = document.documentElement.scrollHeight - document.documentElement.clientHeight;
                const scrolled = (winScroll / height) * 100;
                progressBar.style.width = scrolled + '%';
            });
        }

        // 事件
        function setupEventListeners() {
            fileTabs.addEventListener('click', (e) => {
                if (e.target.classList.contains('file-tab')) {
                    loadFile(e.target.dataset.file);
                }
            });
            
            setupSearch();
            
            window.addEventListener('scroll', () => {
                const headings = contentArea.querySelectorAll('h2, h3');
                let current = '';
                headings.forEach(h => {
                    const rect = h.getBoundingClientRect();
                    if (rect.top <= 120) current = h.id;
                });
                
                tocList.querySelectorAll('.toc-link').forEach(link => {
                    link.classList.toggle('active', link.getAttribute('href') === '#' + current);
                });
            });
        }

        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
