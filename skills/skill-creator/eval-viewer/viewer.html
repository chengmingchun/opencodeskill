<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Eval Review</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600&family=Lora:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #faf9f5;
      --surface: #ffffff;
      --border: #e8e6dc;
      --text: #2d2a26;
      --text-secondary: #6b6560;
      --primary: #4a7c59;
      --primary-light: #e8f0eb;
      --success: #4a7c59;
      --warning: #d4a853;
      --error: #c45c53;
      --radius: 8px;
      --shadow: 0 2px 8px rgba(0,0,0,0.06);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    body {
      font-family: 'Lora', serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      padding: 2rem;
    }

    h1, h2, h3 {
      font-family: 'Poppins', sans-serif;
      font-weight: 600;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 2rem;
      padding-bottom: 1rem;
      border-bottom: 2px solid var(--border);
    }

    .stats {
      display: flex;
      gap: 1.5rem;
    }

    .stat {
      background: var(--surface);
      padding: 0.75rem 1.25rem;
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .stat-value {
      font-family: 'Poppins', sans-serif;
      font-size: 1.5rem;
      font-weight: 600;
      color: var(--primary);
    }

    .stat-label {
      font-size: 0.875rem;
      color: var(--text-secondary);
    }

    .eval-card {
      background: var(--surface);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      margin-bottom: 1.5rem;
      overflow: hidden;
    }

    .eval-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1rem 1.5rem;
      background: var(--primary-light);
      cursor: pointer;
    }

    .eval-title {
      font-family: 'Poppins', sans-serif;
      font-weight: 500;
    }

    .eval-status {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-family: 'Poppins', sans-serif;
      font-size: 0.875rem;
      font-weight: 500;
    }

    .status-pass {
      color: var(--success);
    }

    .status-fail {
      color: var(--error);
    }

    .eval-body {
      padding: 1.5rem;
      display: none;
    }

    .eval-card.open .eval-body {
      display: block;
    }

    .eval-prompt {
      background: var(--bg);
      padding: 1rem;
      border-radius: var(--radius);
      margin-bottom: 1rem;
      font-family: monospace;
      white-space: pre-wrap;
    }

    .assertions {
      margin-top: 1rem;
    }

    .assertion {
      display: flex;
      align-items: flex-start;
      gap: 0.75rem;
      padding: 0.75rem;
      border-radius: var(--radius);
      margin-bottom: 0.5rem;
    }

    .assertion.pass {
      background: var(--primary-light);
    }

    .assertion.fail {
      background: #fceeee;
    }

    .assertion-icon {
      flex-shrink: 0;
      width: 20px;
      height: 20px;
    }

    .pass .assertion-icon {
      color: var(--success);
    }

    .fail .assertion-icon {
      color: var(--error);
    }

    @media (max-width: 768px) {
      .header {
        flex-direction: column;
        align-items: flex-start;
        gap: 1rem;
      }
      
      .stats {
        width: 100%;
        justify-content: space-between;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>Eval Results</h1>
      <div class="stats">
        <div class="stat">
          <div class="stat-value" id="total">0</div>
          <div class="stat-label">Total</div>
        </div>
        <div class="stat">
          <div class="stat-value" id="passed">0</div>
          <div class="stat-label">Passed</div>
        </div>
        <div class="stat">
          <div class="stat-value" id="failed">0</div>
          <div class="stat-label">Failed</div>
        </div>
      </div>
    </div>
    
    <div id="results"></div>
  </div>

  <script>
    // Sample data structure - replace with actual eval data
    const evalData = {
      results: []
    };

    function renderResults() {
      const container = document.getElementById('results');
      const passed = evalData.results.filter(r => r.passed).length;
      const failed = evalData.results.length - passed;
      
      document.getElementById('total').textContent = evalData.results.length;
      document.getElementById('passed').textContent = passed;
      document.getElementById('failed').textContent = failed;

      container.innerHTML = evalData.results.map((result, i) => `
        <div class="eval-card ${result.open ? 'open' : ''}" onclick="this.classList.toggle('open')">
          <div class="eval-header">
            <span class="eval-title">${result.name}</span>
            <span class="eval-status ${result.passed ? 'status-pass' : 'status-fail'}">
              ${result.passed ? '✓ Pass' : '✗ Fail'}
            </span>
          </div>
          <div class="eval-body">
            <div class="eval-prompt">${result.prompt}</div>
            <div class="assertions">
              ${result.assertions.map(a => `
                <div class="assertion ${a.passed ? 'pass' : 'fail'}">
                  <span class="assertion-icon">${a.passed ? '✓' : '✗'}</span>
                  <span>${a.description}</span>
                </div>
              `).join('')}
            </div>
          </div>
        </div>
      `).join('');
    }

    // Load data from URL params or use sample
    const params = new URLSearchParams(window.location.search);
    const dataParam = params.get('data');
    if (dataParam) {
      try {
        Object.assign(evalData, JSON.parse(atob(dataParam)));
      } catch (e) {
        console.error('Failed to parse data:', e);
      }
    }

    renderResults();
  </script>
</body>
</html>
